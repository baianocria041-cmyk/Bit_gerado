<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitLife Clone - Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <header>
            <div class="user-info">
                <h1 id="v-name">Carregando...</h1>
                <h2 id="v-money">R$ 0</h2>
            </div>
            <div class="age-badge">
                <span id="v-age">0 anos</span>
            </div>
        </header>

        <section class="stats-container">
            <div class="stat-row">
                <span>Felicidade</span>
                <div class="bar-bg"><div id="bar-happy" class="bar-fill" style="width: 80%"></div></div>
            </div>
            <div class="stat-row">
                <span>Saúde</span>
                <div class="bar-bg"><div id="bar-health" class="bar-fill" style="width: 100%"></div></div>
            </div>
            <div class="stat-row">
                <span>Inteligência</span>
                <div class="bar-bg"><div id="bar-smart" class="bar-fill" style="width: 50%"></div></div>
            </div>
            <div class="stat-row">
                <span>Aparência</span>
                <div class="bar-bg"><div id="bar-looks" class="bar-fill" style="width: 50%"></div></div>
            </div>
            <div class="stat-row">
                <span>Desempenho Escolar</span>
                <div class="bar-bg"><div id="bar-grades" class="bar-fill" style="width: 0%"></div></div>
            </div>
        </section>

        <main id="event-log">
            </main>

        <footer>
            <button class="btn-action" onclick="abrirJobs()">💼 Ocupação</button>
            <button class="btn-age" onclick="envelhecer()">➕<br>IDADE</button>
            <button class="btn-action" onclick="abrirSocial()">📱 Social</button>
        </footer>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Título</h2>
            <hr>
            <div id="m-content">
                </div>
            <button class="btn-close" onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
