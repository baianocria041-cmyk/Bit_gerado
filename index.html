<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitLife Ultimate Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="profile">
                <h1 id="v-name">Valentina Pereira</h1>
                <p id="v-job-title">Carregando...</p>
            </div>
            <div class="balance">
                <h2 id="v-money">R$ 0</h2>
                <span id="v-age">0 anos</span>
            </div>
        </header>

        <section class="main-stats">
            <div class="stat-box"><span>Felicidade</span><div class="meter"><div id="bar-happy" class="fill happy"></div></div></div>
            <div class="stat-box"><span>Saúde</span><div class="meter"><div id="bar-health" class="fill health"></div></div></div>
            <div class="stat-box"><span>Inteligência</span><div class="meter"><div id="bar-smart" class="fill smart"></div></div></div>
            <div class="stat-box"><span>Aparência</span><div class="meter"><div id="bar-looks" class="fill looks"></div></div></div>
            <div class="stat-box"><span>Desempenho</span><div class="meter"><div id="bar-grades" class="fill grades"></div></div></div>
        </section>

        <div id="event-log"></div>

        <nav class="actions-bar">
            <button class="nav-btn" onclick="abrirOcupacao()">💼 Ocupação</button>
            <button class="age-btn" onclick="envelhecer()">➕<br>IDADE</button>
            <button class="nav-btn" onclick="abrirAtividades()">📱 Atividades</button>
        </nav>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Evento</h2>
            <div id="m-body">
                </div>
            <button class="close-modal-btn" onclick="fecharModal()">Continuar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
