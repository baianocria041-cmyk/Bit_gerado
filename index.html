<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitLife Brasil Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header id="game-header">
            <div class="stats-grid">
                <div class="stat"><span>FELICIDADE</span><div class="bar"><div id="bar-happy"></div></div></div>
                <div class="stat"><span>INTELIGÊNCIA</span><div class="bar"><div id="bar-smart"></div></div></div>
                <div class="stat"><span>SAÚDE</span><div class="bar"><div id="bar-health"></div></div></div>
                <div class="stat"><span>APARÊNCIA</span><div class="bar"><div id="bar-looks"></div></div></div>
            </div>
            <h1 id="v-money">R$ 0</h1>
        </header>

        <main id="event-log"></main>

        <footer id="game-footer">
            <div class="player-info">
                <span id="v-name">Jogador</span> | <span id="v-age">0 anos</span>
            </div>
            <nav class="main-menu">
                <button onclick="abrirAtivos()">📂<br>ATIVOS</button>
                <button onclick="abrirJobs()">💼<br>OCUPAÇÃO</button>
                <div class="btn-age-container">
                    <button class="btn-age" onclick="envelhecer()">+</button>
                    <small>ENVELHECER</small>
                </div>
                <button onclick="abrirSocial()">👥<br>SOCIAL</button>
                <button onclick="abrirAtividades()">🎬<br>ATIVIDADES</button>
            </nav>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Título</h3>
            <div id="m-content"></div>
            <button class="btn-close" onclick="fecharModal()">VOLTAR</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
