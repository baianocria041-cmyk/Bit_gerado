<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitLife Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1 id="v-name">Valentina Pereira</h1>
            <h2 id="v-money">R$ 0</h2>
            <div id="v-age">0 anos</div>
        </header>

        <section class="stats-panel">
            <div class="stat-item"><span>Felicidade</span><div class="bar-bg"><div id="bar-happy" class="fill happy"></div></div></div>
            <div class="stat-item"><span>Saúde</span><div class="bar-bg"><div id="bar-health" class="fill health"></div></div></div>
            <div class="stat-item"><span>Inteligência</span><div class="bar-bg"><div id="bar-smart" class="fill smart"></div></div></div>
            <div class="stat-item"><span>Aparência</span><div class="bar-bg"><div id="bar-looks" class="fill looks"></div></div></div>
            <div class="stat-item"><span>Escola</span><div class="bar-bg"><div id="bar-grades" class="fill grades"></div></div></div>
        </section>

        <div id="event-log"></div>

        <footer>
            <button class="btn-footer" onclick="abrirJobs()">💼 Ocupação</button>
            <button class="btn-age" onclick="envelhecer()">➕<br>IDADE</button>
            <button class="btn-footer" onclick="abrirSocial()">📱 Social</button>
        </footer>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">NASCIMENTO</h2>
            <div id="m-content"></div>
            <button class="btn-close" onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
